name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wps-plugin-excel
        run: pnpm --filter wps-assistant build

      - name: Build wps-plugin-ppt
        run: pnpm --filter wps-plugin-ppt build

      - name: Build wps-plugin-word
        run: pnpm --filter wps-plugin-word build

      - name: Generate publish page
        run: node publish.js --url https://anonymouschar42.github.io/wps-ai-plugin-release/

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy

          # 复制三个插件的构建产物
          cp -r wps-plugin-excel/dist _deploy/wps-plugin-excel
          cp -r wps-plugin-ppt/dist _deploy/wps-plugin-ppt
          cp -r wps-plugin-word/dist _deploy/wps-plugin-word

          # 用 publish.html 作为入口页（WPS 加载项配置/安装页面）
          cp publish.html _deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
